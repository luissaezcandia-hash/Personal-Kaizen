<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" /> 
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Background matches Tailwind zinc-950 -->
  <rect width="256" height="256" rx="60" fill="#09090b" />
  
  <!-- Vertical Bar of K -->
  <path d="M80 64 L80 192" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" />
  
  <!-- Bottom leg of K -->
  <path d="M80 128 L160 192" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Top leg of K (Upward trend arrow) -->
  <path d="M80 128 L176 64" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Arrow head at the top right -->
  <path d="M120 64 L176 64 L176 120" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
